services:
  redis:
    image: redis:alpine
    container_name: redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --maxmemory 64mb --maxmemory-policy allkeys-lru
    networks:
      - auction-net
    restart: always

  backend:
    image: jhh0101/portfolio:latest
    container_name: backend
    env_file:
      - .env
    environment:
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - SPRING_REDIS_PASSWORD=${REDIS_PASSWORD}
    deploy:
      resources:
        limits:
          memory: 450M
    networks:
      - auction-net
    depends_on:
      - redis
    restart: always

  frontend:
    image: jhh0101/portfolio-front:latest
    container_name: frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./nginx.conf:/etc/nginx/conf.d/nginx.conf
    networks:
      - auction-net
    restart: always

networks:
  auction-net:
    driver: bridge