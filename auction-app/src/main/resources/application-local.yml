spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/auction_db
    username: auction_user
    password: auction_password

  data:
    redis:
      host: localhost
      port: 6379
      password: 1234

cloud:
  aws:
    s3:
      bucket: ${ORACLE_BUCKET}
      endpoint: ${ORACLE_ENDPOINT}
    region:
      static: ${ORACLE_REGION}
    credentials:
      access-key: ${ORACLE_ACCESS_KEY_ID}
      secret-key: ${ORACLE_SECRET_ACCESS_KEY}

jwt:
  secret: MySecureJwtSecretKey1234567890ABCDEFGHIJKLMNOP
